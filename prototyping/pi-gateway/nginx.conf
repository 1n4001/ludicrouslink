# nginx configuration with RTMP module

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

# RTMP configuration for receiving streams
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        allow publish all;

        application live {
            live on;
            record off;

            # Allow playback
            allow play all;

            # Forward incoming RTMP stream to gateway TCP port
            # This uses ffmpeg to transcode RTMP -> FLV and push to gateway
            exec_push ffmpeg -i rtmp://localhost:1935/live/$name
                      -c:v copy -c:a copy
                      -f flv tcp://localhost:1936;
        }
    }
}

# HTTP configuration for stats (optional)
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 8080;
        server_name localhost;

        # RTMP statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/share/nginx/html;
        }

        # Control endpoint
        location /control {
            rtmp_control all;
        }
    }
}
